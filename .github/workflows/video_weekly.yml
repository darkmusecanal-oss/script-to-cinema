name: Script-to-Cinema Weekly Pipeline

on:
  # ============================================================
  # SÁBADO 06:00 BRT (09:00 UTC) — ANTES do mangá (14:00 BRT)
  # ============================================================
  schedule:
    - cron: '0 9 * * 6'

  # ============================================================
  # EXECUÇÃO MANUAL
  # ============================================================
  workflow_dispatch:
    inputs:
      theme:
        description: 'Biblical theme (optional — uses queue if empty)'
        required: false
        type: string
      skip_youtube:
        description: 'Skip YouTube upload'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'
  OUTPUT_DIR: ./output
  SCRIPTS_DIR: ./output/scripts
  SCENES_DIR: ./output/scenes
  VIDEOS_DIR: ./output/videos
  SUBS_DIR: ./output/subtitles

jobs:
  # ===========================================================================
  # JOB 1: Generate Script with Gemini
  # ===========================================================================
  generate-script:
    name: "📝 Generate Script (Gemini)"
    runs-on: ubuntu-latest
    outputs:
      queue_item_id: ${{ steps.gemini.outputs.queue_item_id }}
      video_title: ${{ steps.gemini.outputs.video_title }}
      has_script: ${{ steps.gemini.outputs.has_script }}
      theme: ${{ steps.gemini.outputs.theme }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install google-generativeai supabase python-dotenv

      - name: Generate Script
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p ${{ env.SCRIPTS_DIR }}

          python << 'PYTHON_SCRIPT'
          import os, json, sys
          from supabase import create_client

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SUPABASE_KEY = os.environ["SUPABASE_SERVICE_KEY"]
          GEMINI_KEY = os.environ["GEMINI_API_KEY"]

          client = create_client(SUPABASE_URL, SUPABASE_KEY)

          # Se tema manual fornecido
          manual_theme = "${{ inputs.theme }}"

          if manual_theme:
              print(f"Manual theme: {manual_theme}")
              # Inserir na fila
              result = client.table("manga_queue").insert({
                  "theme": manual_theme,
                  "title": manual_theme,
                  "priority": 999,
                  "status": "pending"
              }).execute()
              queue_item = result.data[0]
          else:
              # Buscar próximo pendente da manga_queue (mesma fila do mangá)
              result = client.table("manga_queue").select("*").eq(
                  "status", "pending"
              ).order("priority", desc=True).order("created_at").limit(1).execute()

              if not result.data:
                  print("No pending items in queue")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("has_script=false\n")
                  sys.exit(0)

              queue_item = result.data[0]

          queue_id = queue_item["id"]
          theme = queue_item["theme"]
          print(f"Processing theme: {theme} (ID: {queue_id})")

          # Marcar como video_processing
          client.table("manga_queue").update({
              "status": "video_processing"
          }).eq("id", queue_id).execute()

          # Gerar roteiro com Gemini
          import google.generativeai as genai
          genai.configure(api_key=GEMINI_KEY)
          model = genai.GenerativeModel("gemini-2.0-flash-exp")

          SYSTEM_PROMPT = """You are a biblical cinema scriptwriter.
          Generate a JSON script for a 4:30 minute biblical video:

          OUTPUT FORMAT (JSON ONLY, no markdown):
          {
            "title": "Video Title in Portuguese",
            "theme": "Theme",
            "trailer": {"prompt": "Epic LTX2 prompt", "narration": "Narrator text", "duration": 30},
            "story_scenes": [
              {"scene_number": 1, "title": "Scene", "prompt": "Cinematic LTX2 prompt with lighting, camera, mood", "narration": "Text", "duration": 15}
            ],
            "description": "YouTube SEO description in Portuguese",
            "tags": ["tag1", "tag2"]
          }
          
          14 story scenes of 15 seconds each = 3m30s of story.
          Prompts must include cinematic lighting, camera movement, biblical atmosphere.
          All text in Portuguese (Brazil).
          """

          response = model.generate_content(
              f"{SYSTEM_PROMPT}\n\nGenerate script for: {theme}",
              generation_config={"temperature": 0.8, "max_output_tokens": 8192}
          )

          text = response.text.replace("```json", "").replace("```", "").strip()
          script = json.loads(text)

          # Salvar script
          with open("output/scripts/script.json", "w", encoding="utf-8") as f:
              json.dump(script, f, indent=2, ensure_ascii=False)

          with open("output/scripts/queue_id.txt", "w") as f:
              f.write(str(queue_id))

          title = script.get("title", theme)
          print(f"Script generated: {title}")
          print(f"Scenes: {len(script.get('story_scenes', []))}")

          # Outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"queue_item_id={queue_id}\n")
              f.write(f"video_title={title}\n")
              f.write(f"theme={theme}\n")
              f.write(f"has_script=true\n")
          PYTHON_SCRIPT

      - name: Upload Script Artifact
        if: steps.gemini.outputs.has_script == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-script
          path: ${{ env.SCRIPTS_DIR }}/
          retention-days: 7

  # ===========================================================================
  # JOB 2: Render Scenes (Kaggle GPU)
  # ===========================================================================
  render-scenes:
    name: "🎬 Render Scenes (LTX2/Kaggle)"
    runs-on: ubuntu-latest
    needs: generate-script
    if: needs.generate-script.outputs.has_script == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install kaggle requests

      - name: Download Script
        uses: actions/download-artifact@v4
        with:
          name: generated-script
          path: ${{ env.SCRIPTS_DIR }}

      - name: Render via Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p kaggle-workspace
          
          python << 'PYTHON_SCRIPT'
          import json
          import os
          from ltx2_workflow import KaggleLTX2Renderer

          with open("output/scripts/script.json", "r") as f:
              script = json.load(f)

          scenes = script.get("story_scenes", [])
          trailer = script.get("trailer")
          if trailer:
              scenes.insert(0, trailer)

          print(f"Generating notebook for {len(scenes)} scenes")

          renderer = KaggleLTX2Renderer()
          code = renderer.generate_notebook_code(scenes)

          with open("kaggle-workspace/render_notebook.py", "w") as f:
              f.write(code)

          slug = f"{os.environ['KAGGLE_USERNAME']}/script-to-cinema-render".lower()
          metadata = {
            "id": slug,
            "title": "Script-to-Cinema Render",
            "code_file": "render_notebook.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": "true",
            "enable_gpu": "true",
            "enable_internet": "true",
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": [],
            "model_sources": []
          }
          with open("kaggle-workspace/kernel-metadata.json", "w") as f:
              json.dump(metadata, f, indent=2)

          print("Kaggle workspace prep completed.")
          PYTHON_SCRIPT

          cd kaggle-workspace
          echo "Pushing kernel to Kaggle..."
          kaggle kernels push -p .

          echo "Waiting for Kaggle Kernel to complete (this takes ~45 mins)..."
          export SLUG=$(grep -oP '"id": "\K[^"]+' kernel-metadata.json)
          
          while true; do
            status=$(kaggle kernels status $SLUG 2>/dev/null || echo "status: unknown")
            echo "Current status: $status"
            if echo "$status" | grep -qi "complete"; then
              echo "✅ Kernel run completed!"
              break
            elif echo "$status" | grep -qi "error\|cancel\|fail"; then
              echo "❌ Kernel failed!"
              exit 1
            fi
            sleep 60
          done
          
          echo "Downloading outputs..."
          mkdir -p ../output/scenes
          kaggle kernels output $SLUG -p ../output/scenes || echo "No files returned"

      - name: Upload Render Scenes
        uses: actions/upload-artifact@v4
        with:
          name: render-scenes
          path: output/scenes/
          retention-days: 14

  # ===========================================================================
  # JOB 3: Assemble Video (FFmpeg)
  # ===========================================================================
  assemble-video:
    name: "🎞️ Assemble Video (FFmpeg)"
    runs-on: ubuntu-latest
    needs: [generate-script, render-scenes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download Script
        uses: actions/download-artifact@v4
        with:
          name: generated-script
          path: ${{ env.SCRIPTS_DIR }}

      - name: Download Rendered Scenes
        uses: actions/download-artifact@v4
        with:
          name: rendered-scenes
          path: ${{ env.SCENES_DIR }}
        continue-on-error: true

      - name: Generate Subtitles
        run: |
          mkdir -p ${{ env.SUBS_DIR }}

          python << 'PYTHON_SCRIPT'
          import json
          from subtitle_generator import SubtitleGenerator

          with open("output/scripts/script.json", "r") as f:
              script = json.load(f)

          from dataclasses import dataclass
          @dataclass
          class Scene:
              narration: str
              duration_seconds: int

          scenes = [Scene(s.get("narration",""), s.get("duration",15)) for s in script.get("story_scenes",[])]

          generator = SubtitleGenerator()
          from pathlib import Path
          generator.create_subtitles(scenes, Path("output/subtitles/subtitles.srt"))
          print("Subtitles created")
          PYTHON_SCRIPT

      - name: Assemble Final Video
        env:
          VIDEO_TITLE: ${{ needs.generate-script.outputs.video_title || 'Biblical_Cinema' }}
        run: |
          mkdir -p ${{ env.VIDEOS_DIR }}
          SAFE_TITLE=$(echo "$VIDEO_TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_-')

          if [ -d "${{ env.SCENES_DIR }}" ] && [ "$(ls -A ${{ env.SCENES_DIR }} 2>/dev/null)" ]; then
            echo "Concatenating rendered scenes..."
            for f in ${{ env.SCENES_DIR }}/*.mp4; do
              echo "file '$f'" >> ${{ env.VIDEOS_DIR }}/concat_list.txt
            done

            ffmpeg -y -f concat -safe 0 -i ${{ env.VIDEOS_DIR }}/concat_list.txt \
              -c:v libx264 -preset medium -crf 23 \
              -c:a aac -b:a 128k \
              "${{ env.VIDEOS_DIR }}/${SAFE_TITLE}_final.mp4"
          else
            echo "Creating placeholder video (4:30)"
            ffmpeg -y -f lavfi -i color=c=black:s=1280x720:d=270 \
              -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
              -c:v libx264 -c:a aac -shortest \
              "${{ env.VIDEOS_DIR }}/${SAFE_TITLE}_final.mp4"
          fi

          # Burn subtitles
          if [ -f "${{ env.SUBS_DIR }}/subtitles.srt" ]; then
            ffmpeg -y -i "${{ env.VIDEOS_DIR }}/${SAFE_TITLE}_final.mp4" \
              -vf "subtitles='${{ env.SUBS_DIR }}/subtitles.srt':force_style='FontName=Arial,FontSize=48,PrimaryColour=&HFFDD00,OutlineColour=&H000000,Outline=3,MarginV=60'" \
              -c:a copy \
              "${{ env.VIDEOS_DIR }}/${SAFE_TITLE}_subtitled.mp4"
            echo "Subtitles burned"
          fi

          echo "Video ready!"
          ls -la ${{ env.VIDEOS_DIR }}/

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: ${{ env.VIDEOS_DIR }}/*.mp4
          retention-days: 30

  # ===========================================================================
  # JOB 4: Upload to YouTube + Update manga_queue
  # ===========================================================================
  upload-youtube:
    name: "📺 Upload YouTube + Link Mangá"
    runs-on: ubuntu-latest
    needs: [generate-script, assemble-video]
    if: ${{ !inputs.skip_youtube }}
    outputs:
      youtube_url: ${{ steps.upload.outputs.youtube_url }}
      youtube_id: ${{ steps.upload.outputs.youtube_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib supabase python-dotenv Pillow

      - name: Download Video
        uses: actions/download-artifact@v4
        with:
          name: final-video
          path: ${{ env.VIDEOS_DIR }}

      - name: Download Script
        uses: actions/download-artifact@v4
        with:
          name: generated-script
          path: ${{ env.SCRIPTS_DIR }}

      - name: Upload to YouTube (OAuth2)
        id: upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          QUEUE_ID: ${{ needs.generate-script.outputs.queue_item_id }}
          VIDEO_TITLE: ${{ needs.generate-script.outputs.video_title }}
          THEME: ${{ needs.generate-script.outputs.theme }}
        run: |
          python << 'PYTHON_SCRIPT'
          import os, json, sys
          from pathlib import Path
          from supabase import create_client

          # Encontrar vídeo
          videos_dir = Path("output/videos")
          video_files = sorted(videos_dir.glob("*subtitled*.mp4")) or sorted(videos_dir.glob("*.mp4"))
          if not video_files:
              print("ERROR: No video file found")
              sys.exit(1)

          video_path = video_files[0]
          print(f"Video: {video_path} ({video_path.stat().st_size / 1024 / 1024:.1f} MB)")

          # Carregar script
          with open("output/scripts/script.json", "r") as f:
              script = json.load(f)

          title = os.environ.get("VIDEO_TITLE", script.get("title", "Biblical Cinema"))
          theme = os.environ.get("THEME", "")
          queue_id = os.environ.get("QUEUE_ID", "")

          # Descrição SEO otimizada
          description = f"""📖 {title}

          Uma jornada cinematográfica pelos sagrados textos bíblicos.

          🌟 Tema: {theme}

          📚 Explore os mistérios, as lutas e as revelações que moldaram a história da humanidade.

          ▶️ Assista mais vídeos bíblicos neste canal!
          📥 Baixe o MANGÁ deste episódio no nosso site!

          🔔 INSCREVA-SE e ative o sino para não perder nenhum episódio!

          #bíblia #biblicocinema #cristão #fé #deus #jesus #igreja #epico #cinema #historia
          """

          tags = script.get("tags", []) + [
              "bíblia", "bíblico", "cristão", "fé", "deus", "cinema bíblico",
              "história bíblica", "épico", "narração bíblica", theme.lower()
          ]

          # YouTube Upload via OAuth2
          from youtube_uploader import YouTubeUploader
          uploader = YouTubeUploader(
              client_id=os.environ["YOUTUBE_CLIENT_ID"],
              client_secret=os.environ["YOUTUBE_CLIENT_SECRET"],
              refresh_token=os.environ["YOUTUBE_REFRESH_TOKEN"]
          )

          result = uploader.upload(
              video_path=video_path,
              title=title,
              description=description,
              tags=tags[:15],
              privacy_status="public"
          )

          if result.success:
              youtube_url = result.video_url
              youtube_id = result.video_id
              print(f"✅ Uploaded: {youtube_url}")

              # Atualizar manga_queue com video_url
              client = create_client(
                  os.environ["SUPABASE_URL"],
                  os.environ["SUPABASE_SERVICE_KEY"]
              )

              if queue_id:
                  client.table("manga_queue").update({
                      "status": "video_done",
                      "source_url": youtube_url,
                      "video_id": youtube_id
                  }).eq("id", int(queue_id)).execute()
                  print(f"manga_queue ID {queue_id} → status=video_done, video_url={youtube_url}")

              # Registrar em biblical_videos
              client.table("biblical_videos").insert({
                  "title": title,
                  "theme": theme,
                  "youtube_id": youtube_id,
                  "video_url": youtube_url,
                  "status": "published",
                  "duration_seconds": 270,
                  "queue_id": int(queue_id) if queue_id else None
              }).execute()

              # Outputs
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"youtube_url={youtube_url}\n")
                  f.write(f"youtube_id={youtube_id}\n")
          else:
              print(f"❌ Upload failed: {result.error}")
              sys.exit(1)
          PYTHON_SCRIPT

  # ===========================================================================
  # JOB 5: Summary
  # ===========================================================================
  notify:
    name: "📊 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [generate-script, upload-youtube]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo ""
          echo "=========================================="
          echo "   🎬 SCRIPT-TO-CINEMA SUMMARY"
          echo "=========================================="
          echo "Title: ${{ needs.generate-script.outputs.video_title || 'N/A' }}"
          echo "Theme: ${{ needs.generate-script.outputs.theme || 'N/A' }}"
          echo "Queue ID: ${{ needs.generate-script.outputs.queue_item_id || 'N/A' }}"
          echo "YouTube: ${{ needs.upload-youtube.outputs.youtube_url || 'N/A' }}"
          echo ""
          echo "Pipeline Steps:"
          echo "  [1] Generate Script: ${{ needs.generate-script.result }}"
          echo "  [2] Upload YouTube: ${{ needs.upload-youtube.result }}"
          echo "=========================================="
          echo "Manga pipeline runs at 14:00 BRT (same theme)"
          echo "Next cinema: Saturday 06:00 BRT"
          echo "=========================================="
